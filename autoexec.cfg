// ----------------------------------------------------------------------------
// HUD
// ----------------------------------------------------------------------------

cl_autohelp 0
cl_teammate_colors_show 1
cl_color 1
cl_teamcounter_playercount_instead_of_avatars 1
//cl_sanitize_player_names 1
//cl_hide_avatar_images 2

// "better" mini map
cl_radar_rotate 0
cl_radar_always_centered 0
cl_radar_scale 0.4
cl_hud_radar_scale 1.15
cl_radar_icon_scale_min 1

// ----------------------------------------------------------------------------
//crosshair
// ----------------------------------------------------------------------------

cl_crosshair_t 0
cl_crosshaircolor 5
cl_crosshaircolor_r 255
cl_crosshaircolor_g 0
cl_crosshaircolor_b 255
cl_crosshairdot 0
cl_crosshairgap -3
cl_crosshairgap_useweaponvalue 0
cl_crosshairsize 3
cl_crosshairstyle 4
cl_crosshairthickness 1
cl_sniper_delay_unscope 0
cl_sniper_auto_rezoom 1

// ----------------------------------------------------------------------------
// viewmodel
// ----------------------------------------------------------------------------

viewmodel_presetpos 1
viewmodel_fov 68
viewmodel_offset_x 1
viewmodel_offset_y -2
viewmodel_offset_z -2

// ----------------------------------------------------------------------------
// Sensitivity
// ----------------------------------------------------------------------------

// i use 1200 dpi
sensitivity 0.9
zoom_sensitivity_ratio 1

// ----------------------------------------------------------------------------
// miscellaneous
// ----------------------------------------------------------------------------

//friends needs invites
lobby_default_privacy_bits2 0

// i use G-Sync so Valve recommends V-Sync enabled.
// Also, i set the FPS a bit lower than the spikes i get
fps_max 250

// ----------------------------------------------------------------------------
// Bindings
// ----------------------------------------------------------------------------

// this is set when i run nadespractice.cfg and i like to unbind them here
unbind "p"
unbind "F12"

// quick scope
alias "+qsw" "slot3;"
alias "-qsw" "lastinv;"
bind "5" "+qsw;-qsw"

bind "mwheelup" "+jump"
unbind "mwheeldown"

bind "i" "give weapon_molotov; give weapon_incgrenade"
bind "j" "give weapon_smokegrenade"
bind "k" "give weapon_flashbang"
bind "l" "give weapon_hegrenade"

bind "-" toggle voice_enable 0 1" 


// ----------------------------------------------------------------------------
// And finally...
// ----------------------------------------------------------------------------

host_writeconfig